<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SprintLab{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='images/sprint_lab_img_2.png') }}"
            alt="SprintLab" class="nav-logo">
        </a>

        <div class="navbar-nav ms-auto">
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('home') }}"
                    class="nav-pill {% if request.endpoint == 'home' %}active{% endif %}">
                    Home
                </a>
                <a href="{{ url_for('add_result') }}"
                    class="nav-pill {% if request.endpoint == 'add_result' %}active{% endif %}">
                    Add Result
                </a>
                <a href="{{ url_for('athletes_dashboard') }}"
                    class="nav-pill {% if request.endpoint == 'athletes_dashboard' %}active{% endif %}">
                    Athlete Dashboard
                </a>
                <a href="{{ url_for('event_dashboard') }}"
                    class="nav-pill {% if request.endpoint == 'event_dashboard' %}active{% endif %}">
                    Event Dashboard
                </a>
                <a href="{{ url_for('compare') }}"
                    class="nav-pill {% if request.endpoint == 'compare' %}active{% endif %}">
                    Compare
                </a>
                <a href="{{ url_for('logout') }}"
                    class="nav-pill logout">
                    Logout
                </a>
            {% else %}
                <a href="{{ url_for('login') }}"
                    class="nav-pill {% if request.endpoint == 'login' %}active{% endif %}">
                    Login
                </a>
                <a href="{{ url_for('register') }}"
                    class="nav-pill {% if request.endpoint == 'register' %}active{% endif %}">
                    Register
                </a>
            {% endif %}
        </div>
    </div>
</nav>


<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
